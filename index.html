<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSmart Web Analiz Merkezi</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <style>
        /* Haritanın içine tam oturacağı alan */
        #map { height: 100%; width: 100%; border-radius: 0.5rem; z-index: 1; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-gray-900 text-white p-5 shadow-lg flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold tracking-wider text-green-400">AgroSmart <span class="text-white font-light">| Analiz Platformu</span></h1>
            <p class="text-xs text-gray-400 mt-1">Gelişmiş Tarım ve Uydu Takip Sistemi</p>
        </div>
        <div id="hava-durumu" class="bg-gray-800 px-4 py-2 rounded-lg border border-gray-700 text-sm flex items-center gap-2">
            ⏳ Hava durumu modülü bekleniyor...
        </div>
    </header>

    <div class="flex flex-1 p-5 gap-5 overflow-hidden">
        
        <div class="w-1/4 bg-white p-5 rounded-xl shadow-md border border-gray-200 flex flex-col z-10">
            <h2 class="font-bold text-lg border-b-2 border-green-500 pb-2 mb-4 text-gray-800">Tarlalarım</h2>
            
            <ul id="tarla-listesi" class="overflow-y-auto flex-1 space-y-3">
                <li class="p-3 bg-gray-50 rounded-lg border border-gray-100 text-gray-500 text-sm italic">
                    🔄 Bağlantı kuruluyor, lütfen bekleyin...
                </li>
            </ul>
        </div>

        <div class="w-3/4 bg-white p-2 rounded-xl shadow-md border border-gray-200 relative z-0">
            <div id="map"></div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. HARİTAYI BAŞLAT
        const map = L.map('map').setView([39.0, 35.0], 6);

        // 2. GOOGLE UYDU GÖRÜNTÜSÜ
        L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
        }).addTo(map);

        // =========================================================
        // DİNAMİK KULLANICI GİRİŞ MOTORU
        const urlParams = new URLSearchParams(window.location.search);
        let aktifKullanici = urlParams.get('user'); 

        if (!aktifKullanici || aktifKullanici.trim() === "") {
            aktifKullanici = prompt("🌾 AgroSmart Analiz Merkezi\n\nLütfen sistemde kayıtlı Kullanıcı Adınızı giriniz:", "");
        }

        if (!aktifKullanici || aktifKullanici.trim() === "") {
            alert("Kullanıcı adı girilmedi! Sisteme erişim durduruldu.");
            aktifKullanici = "BOS_KULLANICI"; 
        }
        
        aktifKullanici = aktifKullanici.trim();
        // =========================================================

        let isaretciler = {}; 

        // 3. FİREBASE'DEN TARLALARI ÇEK
        async function verileriCek() {
            const listeDOM = document.getElementById('tarla-listesi');
            listeDOM.innerHTML = '<li class="p-3 bg-gray-50 rounded-lg text-gray-500 text-sm animate-pulse">Veriler Firebase\'den çekiliyor...</li>';

            try {
                const url = `https://agrosmart-erp-default-rtdb.europe-west1.firebasedatabase.app/Kullanicilar/${aktifKullanici}/Tarlalar.json`;
                const response = await fetch(url);
                const data = await response.json();

                listeDOM.innerHTML = ''; 

                if (data && data !== "null") {
                    Object.keys(data).forEach((key, index) => {
                        const tarla = data[key];
                        const enlem = parseFloat(tarla.Enlem) || 39.0;
                        const boylam = parseFloat(tarla.Boylam) || 35.0;

                        // HARİTAYA PİN EKLE
                        const marker = L.marker([enlem, boylam]).addTo(map)
                            .bindPopup(`<div class="text-center"><b class="text-green-700 text-lg">${tarla.TarlaAdi}</b><br>Ekili Ürün: ${tarla.Urun || '-'}<br>Büyüklük: ${tarla.Buyukluk || '0'} Dönüm</div>`);
                        
                        isaretciler[key] = marker;

                        // SOL MENÜ İÇİN LİSTE ELEMANI OLUŞTUR
                        const li = document.createElement('li');
                        li.className = "tarla-item p-3 bg-white rounded-lg border-2 border-gray-200 shadow-sm hover:shadow-md hover:border-green-400 cursor-pointer transition duration-200";
                        li.innerHTML = `
                            <div class="font-bold text-gray-800 text-base">📍 ${tarla.TarlaAdi}</div>
                            <div class="text-xs text-gray-500 mt-1 font-medium">🌱 Ürün: <span class="text-gray-700">${tarla.Urun || 'Belirtilmedi'}</span> | 📏 ${tarla.Buyukluk || '0'} Dönüm</div>
                        `;

                        // TIKLAMA OLAYI
                        li.onclick = () => {
                            document.querySelectorAll('.tarla-item').forEach(el => {
                                el.classList.remove('border-green-500', 'bg-green-50');
                                el.classList.add('border-gray-200', 'bg-white');
                            });
                            
                            li.classList.remove('border-gray-200', 'bg-white');
                            li.classList.add('border-green-500', 'bg-green-50');

                            map.flyTo([enlem, boylam], 16, { animate: true, duration: 1.5 });
                            isaretciler[key].openPopup();

                            havaDurumuGetir(enlem, boylam, tarla.TarlaAdi);

                            // NDVI KATMANINI GÜNCELLE (10 Gün Öncesinin Garanti Verisi)
                            if(window.ndviLayer) {
                                map.removeLayer(window.ndviLayer); 
                            }

                            const onGunOnce = new Date();
                            onGunOnce.setDate(onGunOnce.getDate() - 10);
                            const garantiTarih = onGunOnce.toISOString().split('T')[0];

                            window.ndviLayer = L.tileLayer.wms('https://gibs.earthdata.nasa.gov/wms/epsg3857/best/wms.cgi', {
                                layers: 'MODIS_Terra_NDVI_8Day',
                                format: 'image/png',
                                transparent: true,
                                opacity: 0.7,
                                version: '1.1.1',
                                time: garantiTarih
                            }).addTo(map);
                        };

                        listeDOM.appendChild(li);

                        if (index === 0) { li.click(); }
                    });

                } else {
                    listeDOM.innerHTML = '<li class="p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg">Kayıtlı tarla bulunamadı.</li>';
                    document.getElementById('hava-durumu').innerHTML = `⚠️ Konum verisi yok`;
                }
            } catch (error) {
                console.error("Hata:", error);
                listeDOM.innerHTML = '<li class="p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg font-bold">Veritabanına bağlanılamadı! İnternetinizi kontrol edin.</li>';
            }
        }

        // 4. CANLI HAVA DURUMU
        async function havaDurumuGetir(lat, lon, tarlaAdi) {
            const havaModul = document.getElementById('hava-durumu');
            havaModul.innerHTML = `⏳ ${tarlaAdi} güncelleniyor...`;
            
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                const sicaklik = data.current_weather.temperature;
                const ruzgar = data.current_weather.windspeed;
                
                havaModul.innerHTML = `📍 <b>${tarlaAdi}</b> | 🌤️ Isı: <b class="text-green-400">${sicaklik}°C</b> | 💨 Rüzgar: <b>${ruzgar} km/s</b>`;
            } catch(e) {
                havaModul.innerHTML = `⚠️ ${tarlaAdi} bölgesine ulaşılamadı`;
            }
        }

        // 5. HARİTAYA NDVI LEJANTI EKLE
        const legend = L.control({position: 'bottomright'});

        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'info legend bg-white p-3 rounded-lg shadow-md border border-gray-200 text-sm');
            div.innerHTML = `
                <h4 class="font-bold text-gray-800 mb-2 border-b border-gray-200 pb-1">NDVI Sağlık Durumu</h4>
                <div class="flex items-center mb-1"><span class="w-4 h-4 inline-block mr-2 rounded" style="background: #006400"></span> Yüksek Sağlık (Gür)</div>
                <div class="flex items-center mb-1"><span class="w-4 h-4 inline-block mr-2 rounded" style="background: #78c679"></span> İyi Durumda</div>
                <div class="flex items-center mb-1"><span class="w-4 h-4 inline-block mr-2 rounded" style="background: #ffffcc"></span> Düşük / Stresli Bitki</div>
                <div class="flex items-center"><span class="w-4 h-4 inline-block mr-2 rounded" style="background: #d7191c"></span> Çıplak Toprak / Ölü</div>
            `;
            return div;
        };

        legend.addTo(map);
        verileriCek();
    </script>
</body>
</html>
